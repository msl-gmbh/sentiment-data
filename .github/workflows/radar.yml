name: Global Market Radar

# Eigenes Modul, getrennt von der Datenpipeline. Laeuft den Radar, committet die Ausgabe.
# News + Kalender -> FRED-Gate -> Score -> Level -> Telegram (intern, ab Level 3) + oeffentliche JSON.

on:
  schedule:
    - cron: "0 */3 * * *"   # alle 3 Stunden (UTC). News-tauglich, API-schonend. Anpassbar.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: market-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Node einrichten
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Radar ausfuehren
        env:
          FRED_KEY: ${{ secrets.FRED_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node radar/radar.js

      - name: Ausgabe committen (nur bei Aenderung)
        run: |
          git config user.name "msl-radar-bot"
          git config user.email "msl-radar-bot@users.noreply.github.com"
          git add radar/output/global_market_radar.json radar/output/seen.json radar/output/archive.jsonl
          if git diff --staged --quiet; then
            echo "Keine Aenderung."
          else
            git commit -m "radar: $(date -u +%FT%TZ)"
            git push
          fi
